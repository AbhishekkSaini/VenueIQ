name: VenueIQ CI/CD — Firebase Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================================================
  # Job 1: Lint & Validate
  # ================================================================
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package.json

      - name: Install Cloud Functions dependencies
        run: npm ci
        working-directory: ./functions

      - name: Validate HTML structure
        run: |
          echo "Validating index.html presence and structure..."
          test -f index.html && echo "index.html ✓"
          test -f manifest.json && echo "manifest.json ✓"
          test -f sw.js && echo "sw.js ✓"
          test -f firebase.json && echo "firebase.json ✓"
          test -f robots.txt && echo "robots.txt ✓"
          test -f sitemap.xml && echo "sitemap.xml ✓"

      - name: Validate required JavaScript modules
        run: |
          for f in utils security data-store charts firebase-service crowd-flow queue-manager maps emergency analytics notifications accessibility app; do
            test -f "js/${f}.js" && echo "js/${f}.js ✓" || (echo "MISSING: js/${f}.js" && exit 1)
          done

      - name: Validate assets
        run: |
          for icon in icon-72 icon-96 icon-128 icon-192 icon-512; do
            test -f "assets/${icon}.png" && echo "assets/${icon}.png ✓" || echo "WARNING: assets/${icon}.png missing"
          done
          test -f "assets/og-image.png" && echo "assets/og-image.png ✓"

  # ================================================================
  # Job 2: Security Checks
  # ================================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for exposed secrets
        run: |
          echo "Scanning for potential secret leaks..."
          if grep -rn "AIzaSy[0-9A-Za-z_-]\{30,\}" --include="*.js" --include="*.html" . | grep -v "PLACEHOLDER\|_TEST_\|test\|spec"; then
            echo "WARNING: Possible real API key found. Review before deploying to production."
          else
            echo "No exposed production secrets found ✓"
          fi

      - name: Verify CSP headers present
        run: |
          grep -q 'Content-Security-Policy' index.html && echo "CSP meta tag found ✓" || echo "WARNING: CSP not found"

      - name: Verify security module
        run: |
          grep -q 'sanitizeText' js/security.js && echo "sanitizeText ✓"
          grep -q 'checkRateLimit' js/security.js && echo "checkRateLimit ✓"
          grep -q 'generateToken' js/security.js && echo "generateToken ✓"

  # ================================================================
  # Job 3: Deploy to Firebase Hosting
  # ================================================================
  deploy-hosting:
    name: Deploy — Firebase Hosting
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VENUEIQ_PLATFORM }}
          channelId: live
          projectId: venueiq-platform
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks

  # ================================================================
  # Job 4: Deploy Cloud Functions
  # ================================================================
  deploy-functions:
    name: Deploy — Cloud Functions
    runs-on: ubuntu-latest
    needs: [lint, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cloud Functions dependencies
        run: npm ci
        working-directory: ./functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project venueiq-platform --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
