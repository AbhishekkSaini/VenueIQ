<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>VenueIQ — Test Runner</title>
  <style>
    :root {
      --pass: #00c853; --fail: #f44336;
      --bg: #0a0e1a; --card: #121929; --border: #1e2d4a;
      --text: #e8edf5; --muted: #6b7fa3;
      --primary: #6C63FF; --font: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); padding: 32px; }
    h1 { font-size: 1.8rem; background: linear-gradient(135deg,#6C63FF,#00D4AA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 32px; }
    .summary { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .summary.all-pass { border-color: rgba(0,200,83,0.4); }
    .summary.has-fail  { border-color: rgba(244,67,54,0.4); }
    .summary h2 { font-size: 1.3rem; margin-bottom: 16px; }
    .summary-stats { display: flex; gap: 24px; flex-wrap: wrap; }
    .stat-pass  { color: var(--pass); font-weight: 700; }
    .stat-fail  { color: var(--fail); font-weight: 700; }
    .stat-total { color: var(--muted); }
    .stat-pct   { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
    .suite-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .suite-title { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .suite-title span { color: var(--muted); font-size: 0.8rem; font-weight: 400; margin-left: 8px; }
    .test-row { display: flex; align-items: flex-start; gap: 12px; padding: 8px 10px; border-radius: 6px; margin-bottom: 4px; font-size: 0.855rem; }
    .test-row.pass { background: rgba(0,200,83,0.07); }
    .test-row.fail { background: rgba(244,67,54,0.10); }
    .test-status { width: 16px; flex-shrink: 0; font-weight: 700; }
    .test-row.pass .test-status { color: var(--pass); }
    .test-row.fail .test-status { color: var(--fail); }
    .test-name { flex: 1; color: var(--text); }
    .test-error { color: var(--fail); font-size: 0.78rem; font-family: monospace; margin-top: 2px; display: block; }
    #loading { color: var(--muted); text-align: center; padding: 60px; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid rgba(108,99,255,0.3); border-top-color: #6C63FF; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Skip link for test runner accessibility */
    .skip-link { position: absolute; left: -9999px; }
    .skip-link:focus { left: 16px; top: 16px; }

    /* Reuse ARIA live regions needed by tests */
    .sr-live { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" crossorigin />
</head>
<body>

  <!-- ARIA infrastructure required by accessibility tests -->
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <div id="aria-live-polite"  class="sr-live" aria-live="polite"   aria-atomic="true"></div>
  <div id="aria-live-assertive" class="sr-live" aria-live="assertive" aria-atomic="true"></div>

  <!-- Minimal nav structure for nav landmark tests -->
  <nav role="navigation" aria-label="Test runner navigation">
    <span style="display:none">Test Nav</span>
  </nav>

  <!-- Main content area required by accessibility tests -->
  <main id="main-content" role="main" tabindex="-1">

    <h1>VenueIQ Test Runner</h1>
    <p class="subtitle">Comprehensive test suite — Security, Utils, DataStore, Accessibility, SEO, PWA, DOM Safety</p>
    <div id="loading">
      <div class="spinner"></div>
      <div>Loading application and running tests...</div>
    </div>
    <div id="test-results"></div>

  </main>

  <!-- Load VenueIQ modules (same order as index.html) -->
  <script>
    window.VENUEIQ_CONFIG = Object.freeze({
      MAPS_API_KEY: 'TEST_KEY', VENUE_LAT: 12.9716, VENUE_LNG: 77.5946,
      VENUE_NAME: 'MetroArena Stadium', MAX_CAPACITY: 85000,
      UPDATE_INTERVAL_MS: 5000, VERSION: '2.4.1'
    });
    window.VenueIQ = {};
  </script>
  <script src="../js/utils.js"></script>
  <script src="../js/security.js"></script>
  <script src="../js/data-store.js"></script>
  <script src="../js/charts.js"></script>
  <script src="../tests/tests.js"></script>
  <script>
    // Remove loading state once tests run
    const observer = new MutationObserver(() => {
      document.getElementById('loading').style.display = 'none';
      observer.disconnect();
    });
    observer.observe(document.getElementById('test-results'), { childList: true });

    // Fallback
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 5000);
  </script>
</body>
</html>
